<!DOCTYPE html>
<html>
<head>
    <title>HR Approval Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="table-container">

    <h1>HR Approval Page</h1>

    <table>

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Employee ID</th>
            <th>Leave Type</th>
            <th>From Date</th>
            <th>To Date</th>
            <th>Status</th>
            <th>Action</th>
        </tr>

        {% for row in rows %}

        <tr>

            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[4] }}</td>
            <td>{{ row[5] }}</td>

            <td class="
                {% if row[6] == 'approved' %}
                    status-approved
                {% elif row[6] == 'rejected' %}
                    status-rejected
                {% else %}
                    status-pending
                {% endif %}
            ">
                {{ row[6] }}
            </td>

            <td>

                {% if row[6] == "pending" %}

                <a href="/approve/{{ row[0] }}" class="approve-btn">
                    Approve
                </a>

                <a href="/reject/{{ row[0] }}" class="reject-btn">
                    Reject
                </a>

                {% else %}
                    -
                {% endif %}

            </td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
