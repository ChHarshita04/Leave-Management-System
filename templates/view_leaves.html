<!DOCTYPE html>
<html>
<head>
    <title>View Leave Requests</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="table-container">

    <h1>Employee Leave Requests</h1>

    <table>

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Employee ID</th>
            <th>Leave Type</th>
            <th>From Date</th>
            <th>To Date</th>
            <th>Status</th>
            <th>Delete</th>
        </tr>

        {% for row in rows %}

        <tr>

            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[4] }}</td>
            <td>{{ row[5] }}</td>

            <td class="
                {% if row[6] == 'approved' %}
                    status-approved
                {% elif row[6] == 'rejected' %}
                    status-rejected
                {% else %}
                    status-pending
                {% endif %}
            ">
                {{ row[6] }}
            </td>

            <td>
                <a href="/delete/{{ row[0] }}">
                    <button type="button" class="delete-btn">
                        Delete
                    </button>
                </a>
            </td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
